version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: alphacure-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: alphacure
    networks:
      - alphacure-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alphacure-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/alphacure
      - JWT_SECRET=${JWT_SECRET:-change_this_in_production}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - FRONTEND_URL=http://localhost:3000
      - FLASK_ENV=production
    volumes:
      - ./backend/models:/app/models
      - ./backend/uploads:/app/uploads
      - ./backend/reports:/app/reports
    depends_on:
      - mongodb
    networks:
      - alphacure-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alphacure-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - alphacure-net

volumes:
  mongo_data:

networks:
  alphacure-net:
    driver: bridge
